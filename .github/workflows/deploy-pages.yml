name: Deploy mastory to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "artifacts/mastory/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute BASE_PATH
        id: base-path
        run: |
          if [ -n "${{ vars.PAGES_CUSTOM_DOMAIN }}" ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static files
        env:
          BASE_PATH: ${{ steps.base-path.outputs.value }}
        run: pnpm --filter @workspace/mastory run build

      - name: SPA fallback
        run: cp artifacts/mastory/dist/index.html artifacts/mastory/dist/404.html

      - name: Configure custom domain
        if: ${{ vars.PAGES_CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.PAGES_CUSTOM_DOMAIN }}" > artifacts/mastory/dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/mastory/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
