kind = "web"
previewPath = "/"
title = "마스토리 (Mastory)"
version = "1.0.0"
id = "artifacts/mastory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26000

[services.development]
run = "pnpm --filter @workspace/mastory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mastory", "run", "build" ]
publicDir = "artifacts/mastory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26000"
BASE_PATH = "/"
